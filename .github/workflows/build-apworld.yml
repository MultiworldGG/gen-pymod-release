name: Build per-world .apworld

# Reusable workflow. Produces a <slug>.apworld file by running
# `python Launcher.py "Build APWorlds" -- "<game>" --skip_open_folder`
# inside a MultiworldGG checkout, then uploads the result as a release asset.
#
# Compose alongside build.yml in your per-world repo's make_pyproject.yml.
#
# Caller-trigger guidance:
#   - release: { types: [published] } is the recommended / "easy" path.
#     Publishing a draft release fires this, the reusable build runs,
#     uploads the .whl and .apworld as release assets, and Oliver picks
#     the release up by watching for the .whl.
#   - workflow_dispatch is a power-user / dry-run option. Use it only
#     to target an existing draft release (pass release-tag) to verify
#     the asset before publication. Oliver does not react to dispatch runs.
#
# Example caller `on:` block:
#
#   on: { release: { types: [published] }, workflow_dispatch: { inputs: { release-tag: { required: true } } } }
#   permissions:
#     contents: write
#   jobs:
#     publish-wheel:
#       uses: MultiworldGG/gen-pymod-release/.github/workflows/build.yml@v3
#     publish-apworld:
#       uses: MultiworldGG/gen-pymod-release/.github/workflows/build-apworld.yml@v3
#       with:
#         game: "Your Game Name"
#
# IMPORTANT — `game` is the World.game *display name* (e.g. "My Cool Game"), not the
# folder slug (e.g. "myclgm"). The Launcher's "Build APWorlds" component looks
# up worlds by display name. Release publishing infers the folder slug from
# the release tag prefix; the `apworld` input is for manual dry-runs only.
#
# NOTE — by default this workflow checks out MultiworldGG/MultiworldGG (the
# canonical monorepo) and overlays the caller's worlds/<apworld>/ onto it. If
# your repo is itself an Archipelago fork (a full source tree with its own
# Launcher.py at the root), set `from-fork: true` to build directly from your
# fork's own Launcher; `mwgg-ref` is ignored in that mode.

on:
  workflow_call:
    inputs:
      game:
        description: |
          The world's display name — the value of `World.game` in your Python
          class (e.g. "My Cool Game"). This is passed directly to
          `Launcher.py "Build APWorlds" -- "<game>"`.
        required: true
        type: string
      mwgg-ref:
        description: |
          Ref of MultiworldGG/MultiworldGG to check out as the Launcher host.
          Defaults to `main`. Pin to a release tag (e.g. `0.6.1`) for
          reproducible builds. Ignored when `from-fork: true`.
        required: false
        type: string
        default: "main"
      from-fork:
        description: |
          Set to true when calling from a fork of Archipelago — i.e. the
          caller's repo is a full Archipelago source tree with its own
          Launcher.py at the root. The build runs entirely inside the
          caller's checkout and uses the fork's own Launcher.py; mwgg-ref
          is ignored.
        required: false
        type: boolean
        default: false
      apworld:
        description: |
          World folder slug under worlds/<apworld>. Release publishing ignores
          this and parses the slug from the release tag prefix. This input is
          for workflow_dispatch/manual dry-runs only.
        required: false
        type: string
        default: ""
      release-tag:
        description: |
          Existing GitHub Release tag to upload the .apworld to. Caller
          workflow_dispatch runs pass this to target a human-owned draft before
          publication. Release events default to github.event.release.tag_name.
        required: false
        type: string
        default: ""
      source-ref:
        description: |
          Caller-repo ref to check out as the world source. Defaults to
          release-tag when present, then github.event.release.tag_name, then
          github.sha. Prefer this over apworld-source-ref for new callers.
        required: false
        type: string
        default: ""
      apworld-source-ref:
        description: |
          Caller-repo ref to check out as the world source. Resolution order:
          1. source-ref, if non-empty.
          2. This legacy input, if non-empty.
          3. release-tag or github.event.release.tag_name.
          4. github.sha.
        required: false
        type: string
        default: ""
      dry-run:
        description: Build the .apworld but skip `gh release upload`.
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # for `gh release upload` on the caller repo

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve release-tag
        id: release
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release-tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_RELEASE_TAG}" ]; then
            release_tag="${INPUT_RELEASE_TAG}"
          elif [ -n "${EVENT_RELEASE_TAG}" ]; then
            release_tag="${EVENT_RELEASE_TAG}"
          else
            release_tag=""
          fi
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          if [ -n "${release_tag}" ]; then
            echo "Resolved release-tag: ${release_tag}"
          else
            echo "No release-tag available; this run can build but will not upload."
          fi

      - name: Resolve source-ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.source-ref }}
          LEGACY_INPUT_REF: ${{ inputs.apworld-source-ref }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          CTX_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_REF}" ]; then
            ref="${INPUT_REF}"
          elif [ -n "${LEGACY_INPUT_REF}" ]; then
            ref="${LEGACY_INPUT_REF}"
          elif [ -n "${RELEASE_TAG}" ]; then
            ref="${RELEASE_TAG}"
          else
            ref="${CTX_SHA}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Resolved source-ref: ${ref}"

      - name: Resolve apworld slug
        id: apworld
        env:
          INPUT_APWORLD: ${{ inputs.apworld }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG}" ]; then
            # Tag must be `<apworld>-<world_version>` (e.g. `myclgm-1.2.3`).
            if [[ "${RELEASE_TAG}" != *-* ]]; then
              echo "::error::release tag '${RELEASE_TAG}' has no '-' separator."
              echo "Tag releases as '<apworld>-<world_version>' (e.g. 'myclgm-1.2.3')."
              exit 1
            fi
            apworld="${RELEASE_TAG%%-*}"
            tag_version="${RELEASE_TAG#*-}"
            if [ -z "${apworld}" ] || [ -z "${tag_version}" ]; then
              echo "::error::Release tag '${RELEASE_TAG}' did not parse to a non-empty apworld and world_version."
              exit 1
            fi
            echo "Resolved apworld slug from release tag prefix: ${apworld}"
          elif [ -n "${INPUT_APWORLD}" ]; then
            apworld="${INPUT_APWORLD}"
            echo "Resolved apworld slug from workflow input: ${apworld}"
          else
            echo "::error::Cannot resolve apworld slug: non-release runs must pass the 'apworld' workflow input."
            echo "For release publishing, tag releases as '<apworld>-<world_version>' (e.g. 'myclgm-1.2.3')."
            exit 1
          fi
          echo "apworld=${apworld}" >> "$GITHUB_OUTPUT"

      - name: Checkout MultiworldGG at mwgg-ref
        if: ${{ !inputs.from-fork }}
        uses: actions/checkout@v6
        with:
          repository: MultiworldGG/MultiworldGG
          ref: ${{ inputs.mwgg-ref }}
          path: mwgg
          fetch-depth: 1

      - name: Checkout caller repo at source-ref
        if: ${{ !inputs.from-fork }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          path: caller
          fetch-depth: 1

      - name: Checkout fork at source-ref (build host)
        if: ${{ inputs.from-fork }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          path: mwgg
          fetch-depth: 1

      - name: Overlay caller world onto MultiworldGG checkout
        if: ${{ !inputs.from-fork }}
        env:
          APWORLD: ${{ steps.apworld.outputs.apworld }}
        run: |
          set -euo pipefail
          src="caller/worlds/${APWORLD}"
          dst="mwgg/worlds/${APWORLD}"
          if [ ! -d "${src}" ]; then
            echo "::error::Expected caller/worlds/${APWORLD}/ to exist after checkout."
            echo "Make sure your repo has the world source at worlds/${APWORLD}/."
            exit 1
          fi
          # Caller's version wins; remove any copy the canonical MWGG checkout
          # already ships (many worlds are mirrors in the monorepo).
          if [ -d "${dst}" ]; then
            echo "Removing pre-existing ${dst} (canonical MWGG copy; caller's version wins)"
            rm -rf "${dst}"
          fi
          echo "Copying ${src} -> ${dst}"
          cp -r "${src}" "${dst}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Launcher-host runtime requirements
        run: |
          set -euo pipefail
          cd mwgg
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build .apworld
        env:
          GAME: ${{ inputs.game }}
        run: |
          set -euo pipefail
          cd mwgg
          python Launcher.py "Build APWorlds" -- "${GAME}" --skip_open_folder

      - name: Verify .apworld was produced
        id: artifact
        env:
          APWORLD: ${{ steps.apworld.outputs.apworld }}
        run: |
          set -euo pipefail
          apworld_path="mwgg/build/apworlds/${APWORLD}.apworld"
          if [ ! -f "${apworld_path}" ]; then
            echo "::error::Expected output file '${apworld_path}' was not produced."
            echo "Check that 'game: ${{ inputs.game }}' exactly matches the World.game attribute."
            echo "Contents of mwgg/build/apworlds/ (if it exists):"
            ls -la mwgg/build/apworlds/ 2>/dev/null || echo "(directory not created)"
            exit 1
          fi
          echo "apworld_path=${apworld_path}" >> "$GITHUB_OUTPUT"
          echo "apworld_basename=${APWORLD}.apworld" >> "$GITHUB_OUTPUT"
          echo "Artifact: ${apworld_path} ($(du -h "${apworld_path}" | cut -f1))"

      - name: Upload .apworld to release
        if: ${{ !inputs.dry-run && steps.release.outputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail
          apworld_path="${{ steps.artifact.outputs.apworld_path }}"
          echo "Uploading ${{ steps.artifact.outputs.apworld_basename }} to release ${RELEASE_TAG}"
          # --clobber is intentional for .apworld: the Index does NOT pin a
          # SHA256 for this asset (only the wheel gets a #sha256= fragment).
          # Clobber lets authors re-run the workflow after a transient failure
          # without needing to delete the asset manually first.
          gh release upload "${RELEASE_TAG}" "${apworld_path}" \
            --clobber \
            --repo "${{ github.repository }}"
          echo "Uploaded: https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/${{ steps.artifact.outputs.apworld_basename }}"

      - name: Non-release / dry-run summary
        if: ${{ inputs.dry-run || steps.release.outputs.release_tag == '' }}
        run: |
          echo "::notice::Skipping release-asset upload (dry-run=${{ inputs.dry-run }}, release-tag=${{ steps.release.outputs.release_tag }})."
          echo "Game: ${{ inputs.game }}"
          echo "Apworld slug: ${{ steps.apworld.outputs.apworld }}"
          echo "Source ref: ${{ steps.ref.outputs.ref }}"
          echo "Built artifact: ${{ steps.artifact.outputs.apworld_path }}"
          echo ""
          echo "Contents of mwgg/build/apworlds/:"
          ls -la mwgg/build/apworlds/ || true
