name: Build python module whl of APWorld

# Reusable workflow for flat-layout pure-Python setuptools repos:
#
#   on:
#     workflow_dispatch:
#       inputs:
#         version: { required: true, type: string }
#   jobs:
#     publish:
#       uses: MultiworldGG/gen-pymod-release/.github/workflows/build-wheel.yml@v3
#       with: { version: ${{ inputs.version }} }
#
# Trigger model (distinct from build.yml / build-apworld.yml):
#   This workflow shapes its own release — it creates the tag, creates the
#   GitHub Release, and uploads the wheel from the given version. Caller
#   workflow_dispatch is the normal trigger here, not a power-user path.
#   It is NOT the APWorld release flow; APWorld repos should use the
#   helper + draft + release: published path documented in build-apworld.yml
#   and build.yml. Oliver picks up published releases by watching for the
#   .whl, regardless of which reusable workflow uploaded it.
#
# Builds and releases a wheel from the requested version. The committed
# pyproject.toml is not modified.

on:
  workflow_call:
    inputs:
      version:
        description: Version to release (e.g. 0.1.1); tag is v<version>.
        required: true
        type: string
      source-ref:
        description: Git ref of the caller repo to build. Defaults to github.sha.
        required: false
        type: string
        default: ""
      python-version:
        description: Python version for build tooling.
        required: false
        type: string
        default: "3.13"
      dry-run:
        description: Build the wheel but skip tag / release / asset upload.
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # tag ref, release create, asset upload on the caller repo

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve source-ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.source-ref }}
          CTX_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_REF}" ]; then
            ref="${INPUT_REF}"
          else
            ref="${CTX_SHA}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Resolved source-ref: ${ref}"

      - name: Checkout caller repo at source-ref
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install build-time deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install tomli_w build packaging

      - name: Normalize version and rewrite pyproject.toml [project].version
        id: ver
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          python <<'PY'
          import os, pathlib, sys, tomllib
          import tomli_w
          from packaging.version import Version, InvalidVersion

          raw = os.environ["RAW_VERSION"].strip()
          # Match the version setuptools writes into the wheel filename.
          try:
              canonical = str(Version(raw))
          except InvalidVersion as e:
              sys.exit(f"::error::input version {raw!r} is not a valid PEP 440 version: {e}")

          path = pathlib.Path("pyproject.toml")
          if not path.exists():
              sys.exit("::error::pyproject.toml not found at repo root")
          with path.open("rb") as f:
              data = tomllib.load(f)
          if "project" not in data:
              sys.exit("::error::pyproject.toml has no [project] table")
          old = data["project"].get("version", "<unset>")
          data["project"]["version"] = canonical
          with path.open("wb") as f:
              tomli_w.dump(data, f)

          print(f"Input version: {raw!r}  ->  canonical: {canonical}")
          print(f"Rewrote pyproject.toml [project].version: {old} -> {canonical}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gh:
              gh.write(f"version={canonical}\n")
          PY

      - name: Build wheel
        run: |
          set -euo pipefail
          python -m build --wheel
          ls -la dist/

      - name: Sanity-check wheel
        id: wheel
        env:
          EXPECTED_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "::error::expected exactly one wheel under dist/, got ${#wheels[@]}"
            exit 1
          fi
          wheel="${wheels[0]}"
          basename="$(basename "$wheel")"
          # Wheel filename: {distribution}-{version}-{python tag}-{abi tag}-{platform tag}.whl
          if [[ "$basename" != *"-${EXPECTED_VERSION}-"* ]]; then
            echo "::error::wheel '${basename}' does not contain version segment '-${EXPECTED_VERSION}-'"
            exit 1
          fi
          echo "wheel=${wheel}" >> "$GITHUB_OUTPUT"
          echo "basename=${basename}" >> "$GITHUB_OUTPUT"
          echo "Built wheel: ${basename}"

      - name: Tag, release, and upload wheel
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SOURCE_REF: ${{ steps.ref.outputs.ref }}
          WHEEL: ${{ steps.wheel.outputs.wheel }}
          BASENAME: ${{ steps.wheel.outputs.basename }}
        run: |
          set -euo pipefail
          tag="v${VERSION}"

          # source-ref may be a branch name or short SHA.
          sha="$(git rev-parse "${SOURCE_REF}^{commit}")"

          # Reuse an existing tag only when it already points at this commit.
          if existing_sha=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}" --jq '.object.sha' 2>/dev/null); then
            if [ "${existing_sha}" = "${sha}" ]; then
              echo "Tag ${tag} already exists at ${sha} -- reusing."
            else
              echo "::error::Tag ${tag} exists at ${existing_sha}, but source-ref resolves to ${sha}."
              echo "Refusing to move the tag silently. If this is intentional, delete the tag + release manually first."
              exit 1
            fi
          else
            echo "Creating tag ${tag} at ${sha}"
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f "ref=refs/tags/${tag}" \
              -f "sha=${sha}"
          fi

          # The release may exist from a prior partial run, reuse it if possible.
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists -- skipping create."
          else
            echo "Creating release ${tag}"
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --generate-notes
          fi

          # Upload the wheel. No --clobber: re-uploads must be deliberate.
          # See build.yml for the same convention and rationale (consumers
          # may pin asset bytes by SHA-256 fragment).
          echo "Uploading ${BASENAME} to release ${tag}"
          gh release upload "${tag}" "${WHEEL}" \
            --repo "${GITHUB_REPOSITORY}"

          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${BASENAME}"
          echo "Asset URL: ${url}"

      - name: Dry-run summary
        if: ${{ inputs.dry-run }}
        env:
          BASENAME: ${{ steps.wheel.outputs.basename }}
        run: |
          echo "::notice::Dry-run: built ${BASENAME}, skipped tag/release/upload."
          ls -la dist/
