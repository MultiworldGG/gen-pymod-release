name: Build and publish per-world wheel branch

# Reusable workflow. Invoked by per-world repos like:
#
#   on: { release: { types: [published] }, workflow_dispatch: {} }
#   jobs:
#     publish:
#       uses: MultiworldGG/build-and-publish-action/.github/workflows/build.yml@v3
#       # No `with:` — slug comes from vars.WORLD_FOLDER_NAME
#       # No `secrets:` — no Oliver secrets needed
#
# Builds the world from the caller repo's worlds/<slug>/ subtree, force-pushes a
# `wheel/worlds/<slug>` orphan branch on the caller repo, and tags it immutably
# as `wheel/worlds/<slug>/<world_version>`. The matching Index PR is opened
# separately by the Oliver-Multiworld-Squirrel GitHub App when it sees the
# workflow_run.completed event from this workflow.

on:
  workflow_call:
    inputs:
      source-ref:
        description: |
          Git ref of the caller repo to build from. Defaults to the release tag
          (when triggered by `release: published`) or the current SHA otherwise.
        required: false
        type: string
        default: ""
      dry-run:
        description: Skip orphan push; just shape and validate.
        required: false
        type: boolean
        default: false
      pip-build-check:
        description: Run `python -m build` against the shaped tree to catch errors before push.
        required: false
        type: boolean
        default: true
      allow-tag-reuse:
        description: |
          Allow re-publishing the existing tag if (and only if) the new commit SHA
          would be identical. Default false — any tag-reuse fails hard.
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # for orphan-branch + tag push to the caller repo

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve slug from repo variable
        id: slug
        env:
          WORLD_FOLDER_NAME: ${{ vars.WORLD_FOLDER_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${WORLD_FOLDER_NAME}" ]; then
            echo "::error::Repository variable WORLD_FOLDER_NAME is not set."
            echo "Set it in Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          echo "slug=${WORLD_FOLDER_NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved slug: ${WORLD_FOLDER_NAME}"

      - name: Resolve source ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.source-ref }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          CTX_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_REF}" ]; then
            ref="${INPUT_REF}"
          elif [ "${EVENT_NAME}" = "release" ] && [ -n "${RELEASE_TAG}" ]; then
            ref="${RELEASE_TAG}"
          else
            ref="${CTX_SHA}"
          fi
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "Resolved source-ref: ${ref}"

      - name: Checkout caller repo at source-ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 1

      - name: Checkout build-and-publish-action (for scripts/templates)
        # github.workflow_sha pins to the exact commit of the reusable workflow
        # the caller invoked. Without this, scripts could drift from the YAML.
        uses: actions/checkout@v4
        with:
          repository: MultiworldGG/build-and-publish-action
          ref: ${{ github.workflow_sha }}
          path: .build-and-publish-action

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build-time deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install tomli_w build

      - name: Shape orphan tree
        id: shape
        run: |
          set -euo pipefail
          python .build-and-publish-action/scripts/shape_orphan.py \
            --source-root . \
            --slug "${{ steps.slug.outputs.slug }}" \
            --templates-dir .build-and-publish-action/templates \
            --output-dir .orphan-tree \
            --caller-repo "${{ github.repository }}" \
            --source-ref "${{ steps.ref.outputs.ref }}"
          # Read world_version from the same archipelago.json the script just used.
          world_version=$(python -c "
          import json, sys
          d = json.load(open('worlds/${{ steps.slug.outputs.slug }}/archipelago.json', encoding='utf-8'))
          print(d['world_version'])
          ")
          echo "world_version=${world_version}" >> "$GITHUB_OUTPUT"
          echo "World version: ${world_version}"

      - name: pip build sanity check
        if: inputs.pip-build-check
        run: |
          set -euo pipefail
          (cd .orphan-tree && python -m build --wheel)
          ls -la .orphan-tree/dist/

      - name: Push wheel branch + tag (caller repo)
        id: push
        if: ${{ !inputs.dry-run }}
        env:
          ORPHAN_TREE: ${{ github.workspace }}/.orphan-tree
          WORLD_VERSION: ${{ steps.shape.outputs.world_version }}
          WORLD_SLUG: ${{ steps.slug.outputs.slug }}
          CALLER_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: |
            wheel: ${{ steps.slug.outputs.slug }} ${{ steps.shape.outputs.world_version }}

            Built from ${{ steps.ref.outputs.ref }} by MultiworldGG/build-and-publish-action.
          GIT_USER_NAME: github-actions[bot]
          GIT_USER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          ALLOW_TAG_REUSE: ${{ inputs.allow-tag-reuse && '1' || '0' }}
        run: bash .build-and-publish-action/scripts/push_wheel_branch.sh

      - name: Dry-run summary
        if: inputs.dry-run
        run: |
          echo "::notice::dry-run mode: shaped tree is at .orphan-tree/, but nothing pushed."
          echo "World: ${{ steps.slug.outputs.slug }}@${{ steps.shape.outputs.world_version }}"
          echo "Source ref: ${{ steps.ref.outputs.ref }}"
