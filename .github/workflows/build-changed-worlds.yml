name: Build changed-world wheels (bulk)

# Reusable workflow. A caller in the worlds-source repo (e.g. MultiworldGG/MultiworldGG)
# triggers this on push; we diff worlds/** against the previous commit and build +
# upload a wheel for each changed world via scripts/seed_wheels.py.
on:
  workflow_call:
    inputs:
      source-ref:
        description: "Ref of the worlds-source repo to build from (default: triggering sha)"
        type: string
        required: false
        default: ""
      base-ref:
        description: "Base ref to diff worlds/** against (default: github.event.before)"
        type: string
        required: false
        default: ""
      gen-ref:
        description: "Ref of MultiworldGG/gen-pymod-release for scripts + templates + overrides"
        type: string
        required: false
        default: "main"
      release-repo:
        description: "owner/repo whose GitHub release receives the wheels"
        type: string
        required: false
        default: "MultiworldGG/MultiworldGG-Beta"
      release-tag:
        description: "Release tag to upload to (default: worlds-wheels-<date>)"
        type: string
        required: false
        default: ""
      upload-client-id:
        description: "GitHub App Client ID (Iv23...) of the app that uploads wheels to release-repo"
        type: string
        required: true
      dry-run:
        description: "Build wheels but skip the upload"
        type: boolean
        required: false
        default: false
    secrets:
      upload-private-key:
        description: "PEM private key of the GitHub App identified by upload-client-id"
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout worlds source (caller repo)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source-ref || github.sha }}
          path: source

      - name: Checkout gen-pymod-release (scripts + templates + overrides)
        uses: actions/checkout@v6
        with:
          repository: MultiworldGG/gen-pymod-release
          ref: ${{ inputs.gen-ref }}
          path: gen-pymod-release

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build deps
        run: python -m pip install --upgrade pip build setuptools wheel tomli_w

      - name: Determine changed worlds
        id: changed
        working-directory: source
        env:
          BASE_REF: ${{ inputs.base-ref || github.event.before }}
          HEAD_REF: ${{ inputs.source-ref || github.sha }}
        run: |
          set -euo pipefail
          BASE="${BASE_REF}"
          HEAD="${HEAD_REF}"
          # Fetch just the two endpoints; a two-point diff needs both trees, not the
          # intervening history. Fall back to HEAD^ for a first push with no `before`.
          if [ -z "${BASE}" ] || [ "${BASE}" = "0000000000000000000000000000000000000000" ]; then
            git fetch --no-tags --depth=2 origin "${HEAD}" || true
            BASE="$(git rev-parse --verify --quiet "${HEAD}^" || true)"
          else
            git fetch --no-tags --depth=1 origin "${BASE}" "${HEAD}" || true
          fi
          if [ -z "${BASE}" ]; then
            echo "No base commit to diff against; nothing to build."
            echo "worlds=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # worlds/<name>/... -> <name>; drop deletions (-d), shared _-prefixed dirs, dups.
          CHANGED=$(git diff --diff-filter=d --name-only "${BASE}..${HEAD}" -- 'worlds/' \
            | sed -n 's#^worlds/\([^/]*\)/.*#\1#p' \
            | grep -v '^_' \
            | sort -u \
            | tr '\n' ' ' || true)
          echo "worlds=${CHANGED}" >> "$GITHUB_OUTPUT"
          echo "Changed worlds: ${CHANGED:-(none)}"

      - name: Resolve release repo owner/name
        id: relrepo
        if: steps.changed.outputs.worlds != ''
        env:
          RELEASE_REPO: ${{ inputs.release-repo }}
        run: |
          echo "owner=${RELEASE_REPO%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${RELEASE_REPO#*/}"   >> "$GITHUB_OUTPUT"

      - name: Mint upload token (GitHub App)
        id: app-token
        if: steps.changed.outputs.worlds != ''
        uses: actions/create-github-app-token@v3   # pin to a commit SHA in practice
        with:
          client-id: ${{ inputs.upload-client-id }}
          private-key: ${{ secrets.upload-private-key }}
          owner: ${{ steps.relrepo.outputs.owner }}
          repositories: ${{ steps.relrepo.outputs.name }}

      - name: Build + upload wheels
        if: steps.changed.outputs.worlds != ''
        env:
          WORLDS: ${{ steps.changed.outputs.worlds }}
          SEED_SOURCE_ROOT: ${{ github.workspace }}/source
          SEED_GEN_PYMOD: ${{ github.workspace }}/gen-pymod-release
          SEED_BUILD_PYTHON: python
          SEED_STAGING: ${{ github.workspace }}/.seed-staging
          SEED_OVERRIDES_DIR: ${{ github.workspace }}/gen-pymod-release/seed_overrides
          SEED_RELEASE_REPO: ${{ inputs.release-repo }}
          SEED_RELEASE_TAG: ${{ inputs.release-tag }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set +e   # one world's build failure must not block uploading the rest
          SCRIPT="${GITHUB_WORKSPACE}/gen-pymod-release/scripts/seed_wheels.py"
          python "$SCRIPT" build --worlds $WORLDS
          BUILD_RC=$?
          python "$SCRIPT" upload --only $WORLDS ${{ inputs.dry-run && '--dry-run' || '' }}
          UPLOAD_RC=$?
          echo "build rc=$BUILD_RC  upload rc=$UPLOAD_RC"
          [ "$UPLOAD_RC" -eq 0 ] || exit "$UPLOAD_RC"
          exit "$BUILD_RC"

      - name: No changed worlds
        if: steps.changed.outputs.worlds == ''
        run: echo "No changed worlds under worlds/**; nothing to build."
